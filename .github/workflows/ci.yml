name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    name: Lint, type-check & tests
    runs-on: ubuntu-latest

    env:
      # URL factice — prisma generate n'ouvre pas de connexion, mais
      # prisma.config.ts via dotenv exige que la variable soit définie.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm type-check

      - name: Tests
        run: pnpm test
