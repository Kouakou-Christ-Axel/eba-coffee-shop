name: CD

on:
  push:
    branches: [master]

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  ci:
    name: Lint, type-check & tests
    runs-on: ubuntu-latest

    env:
      # URL factice — prisma generate n'ouvre pas de connexion, mais
      # prisma.config.ts via dotenv exige que la variable soit définie.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm type-check

      - name: Tests
        run: pnpm test

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.VPS_DEPLOY_PATH }}
            git pull origin master
            pnpm install --frozen-lockfile
            pnpm build
            pnpm db:trigger
            pm2 startOrReload ecosystem.config.js --update-env
        # Secrets requis dans GitHub → Settings → Secrets and variables → Actions :
        # VPS_HOST          : IP ou hostname du VPS (ex: 1.2.3.4)
        # VPS_USER          : utilisateur SSH (ex: ubuntu, root)
        # VPS_SSH_KEY       : clé SSH privée (contenu complet, ex: -----BEGIN OPENSSH PRIVATE KEY-----)
        # VPS_DEPLOY_PATH   : chemin absolu du projet sur le VPS (ex: /var/www/eba-coffee-shop)
